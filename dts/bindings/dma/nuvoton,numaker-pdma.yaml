description: Nuvoton NuMaker PDMA controller

compatible: "nuvoton,numaker-pdma"

include: [dma-controller.yaml, reset-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  resets:
    required: true

  clocks:
    required: true

  dma-channels:
    required: true

  dma-requests:
    required: true

  "#dma-cells":
    const: 2

dma-cells:
  - channel
  - slot
