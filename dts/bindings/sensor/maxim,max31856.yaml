description: MAX31856 SPI-based cold-junction compensated thermocouple-to-digital converter.

compatible: "maxim,max31856"

include: [sensor-device.yaml, spi-device.yaml]

properties:

  num-sample-to-avg:
    default: 1
    type: int
    enum:
      - 1
      - 2
      - 4
      - 8
      - 16

  thermocouple-type:
    default: "K"
    type: string
    enum:
      - "B"
      - "E"
      - "J"
      - "K"
      - "N"
      - "R"
      - "S"
      - "T"
    description: The type of thermocouple connector on the board. 

  fault-gpios:
    type: phandle-array

  drdy-gpios:
    type: phandle-array
