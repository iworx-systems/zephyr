description: Nuvoton, NuMaker SPI controller

compatible: "nuvoton,numaker-spi"

include: [spi-controller.yaml, reset-device.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  resets:
    required: true

  clocks:
    required: true

  dmas:
    required: false
    description: DMA specifiers for SPI transfers, ordered as TX and RX.

  dma-names:
    required: false
    description: DMA channel names. Must be "tx", "rx" when present.
