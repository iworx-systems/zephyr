description: SN74HC595 SPI based GPIO expander

compatible: "ti,sn74hc595"

include: [gpio-controller.yaml, spi-device.yaml]

properties:
  reset-gpios:
    type: phandle-array
    description: Reset pin

  ngpios:
    type: int
    required: true
    const: 8
    description: Number of supported gpios

  cs-invert:
    type: boolean
    description: |
      If the chip select connected to the "RCLK" pin on the 
      shift register has an inverter between it and the 
      microcontroller, this can be set to invert the chip 
      select polarity. This is useful in cases where you are
      using the shift register across an isolation barrier for
      say configurating GPIO on an SPI ADC and you do not want
      to add an extra isolated gpio for the chip select.

  "#gpio-cells":
    const: 2

gpio-cells:
  - pin
  - flags
