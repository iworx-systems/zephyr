description: Nuvoton NuMaker DAC controller

compatible: "nuvoton,numaker-dac"

include: [dac-controller.yaml, reset-device.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true

  clocks:
    required: true

  resets:
    required: true

  "#io-channel-cells":
    const: 1

io-channel-cells:
  - output
